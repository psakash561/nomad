name: Nomad Terraform Deploy

concurrency:
  group: nomad-terraform
  cancel-in-progress: true

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Python dependencies
        run: pip install boto3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Run Nomad Brain (detect cheapest region)
        run: python ../brain.py

      - name: Get Target Region
        run: |
          TARGET_REG=$(grep target_region terraform.tfvars | cut -d'"' -f2)
          echo "TARGET_REGION=$TARGET_REG" >> $GITHUB_ENV
          echo "Deploying to region: $TARGET_REG"

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Backend Image
        run: docker build -t nomad-backend:${{ github.sha }} ../app/backend

      - name: Build Frontend Image
        run: docker build -t nomad-frontend:${{ github.sha }} ../app/frontend

      - name: Tag Images
        run: |
          docker tag nomad-backend:${{ github.sha }} \
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.TARGET_REGION }}.amazonaws.com/nomad-backend:${{ github.sha }}

          docker tag nomad-frontend:${{ github.sha }} \
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.TARGET_REGION }}.amazonaws.com/nomad-frontend:${{ github.sha }}

      - name: Push Images
        run: |
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.TARGET_REGION }}.amazonaws.com/nomad-backend:${{ github.sha }}
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.TARGET_REGION }}.amazonaws.com/nomad-frontend:${{ github.sha }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="key=nomad/${TARGET_REGION}/terraform.tfstate" \
            -reconfigure

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Apply
        run: |
          terraform apply \
            -auto-approve \
            -var="target_region"=${TARGET_REGION}" \
            -lock-timeout=300s

      - name: Get Terraform Outputs
        run: |
          echo "CLUSTER_NAME=$(terraform output -raw cluster_name)" >> $GITHUB_ENV
          echo ="TARGET_REGION=$(terraform output -raw cluster_region)" >> $GITHUB_ENV

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig \
            --region $TARGET_REGION \
            --name $CLUSTER_NAME

      - name: Deploy App to Kubernetes
        run: kubectl apply -f $GITHUB_WORKSPACE/k8s/

      - name: Destroy Previous Region
        run: |
      
          TARGET_REGION=$(terraform output -raw cluster_region)
          echo "Current region: $TARGET_REGION"

          BUCKET="akash-nomad-terraform-state"
          REGIONS=$(aws s3 ls s3://$BUCKET/nomad/ | awk '{print $2}' | sed 's#/##')

          for region in $REGIONS; do
            if [ "$region" != "$TARGET_REGION" ]; then
              echo "Destroying infrastructure in $region"

              terraform init \
                -backend-config="key=nomad/$region/terraform.tfstate" \
                -reconfigure

              terraform destroy \
                -auto-approve \
                -var="target_region=$region"
            fi
          done