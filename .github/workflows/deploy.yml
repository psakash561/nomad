name: Nomad Terraform Deploy

concurrency:
  group: nomad-terraform
  cancel-in-progress: true

on:
  push:
    branches: [main]

  workflow_dispatch: {}

jobs:
  terraform:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Python dependencies
        run: pip install boto3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Run Nomad Brain (detect cheapest region)
        run: python ../brain.py

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Backend Image
        run: |
          docker build -t nomad-backend:${{ github.sha }} ../app/backend

      - name: Build Frontend Image
        run: |
          docker build -t nomad-frontend:${{ github.sha }} ../app/frontend

      - name: Tag Images
        run: |
          docker tag nomad-backend:${{ github.sha }} \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/nomad-backend:${{ github.sha }}

          docker tag nomad-frontend:${{ github.sha }} \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/nomad-frontend:${{ github.sha }}

      - name: Push Images
        run: |
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/nomad-backend:${{ github.sha }}
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/nomad-frontend:${{ github.sha }}

      - name: Terraform Init
        run: terraform init -reconfigure

      - name: Select / Create Workspace
        run: |
          TARGET_REG=$(grep target_region terraform.tfvars | cut -d'"' -f2)

          echo "Target region: $TARGET_REG"

          terraform workspace select "$TARGET_REG" \
          || terraform workspace new "$TARGET_REG"

      - name: Terraform Apply
        run: terraform apply -auto-approve -lock-timeout=300s

      - name: Terraform Validate
        run: terraform validate

      - name: Get Terraform Outputs
        run: |
          echo "CLUSTER_NAME=$(terraform output -raw cluster_name)" >> $GITHUB_ENV
          echo "AWS_REGION=$(terraform output -raw cluster_region)" >> $GITHUB_ENV

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig \
            --region $AWS_REGION \
            --name $CLUSTER_NAME

      - name: Deploy App to Kubernetes
        run: |
          kubectl apply -f $GITHUB_WORKSPACE/k8s/

      - name: Debug Terraform Workspaces
        run: |
         echo "Available workspaces:"
         terraform workspace list

      - name: Destroy Old Workspace
        run: |
          CURRENT_REG=$(grep target_region terraform.tfvars | cut -d'"' -f2)

          for ws in $(terraform workspace list | tr -d '* '); do
            if [[ "$ws" != "$CURRENT_REG" && "$ws" != "default" ]]; then
              echo "Destroying old environment: $ws"

              terraform workspace select "$ws"
              terraform destroy -auto-approve

              terraform workspace select "$CURRENT_REG"
              terraform workspace delete "$ws"
            fi
          done