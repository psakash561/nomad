apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend

spec:
  replicas: 2

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
      - name: backend
        image: 818876620577.dkr.ecr.us-east-1.amazonaws.com/nomad-backend:latest
        ports:
        - containerPort: 8080